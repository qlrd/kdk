# Build rustdoc for the workspace and publish it to the `gh-pages`
# branch. Triggers on every push to `master` and on manual dispatch.
#
# Conventions:
# - `force_orphan: true` keeps `gh-pages` at a single rolling commit
#   (no binary-churn history bloat).
# - `.nojekyll` disables Jekyll so rustdoc's `_underscore`-prefixed
#   files (search index, theme bits) are served verbatim.
# - The landing `index.html` is generated by scanning `target/doc/*/`
#   for every documented crate — no hardcoded crate name. New crates
#   appear on the landing page automatically.

name: Docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build rustdoc
        run: cargo doc --workspace --no-deps

      - name: Build landing index + copy logo + disable Jekyll
        run: |
          # Copy the project logo so it lands at /logo.png on gh-pages
          # and can be referenced from the landing page.
          cp assets/logo.png target/doc/logo.png

          # List every documented crate by scanning `target/doc/*/`.
          # A real crate dir contains an `index.html`; auxiliary dirs
          # (`search.index/`, `static.files/`, `src/`, etc.) don't.
          cat > target/doc/index.html <<'HEAD'
          <!DOCTYPE html>
          <meta charset="utf-8">
          <title>KDK — API docs</title>
          <style>
            body { font-family: system-ui, sans-serif; max-width: 40em; margin: 2em auto; padding: 0 1em; }
            .logo { display: block; max-width: 360px; height: auto; margin: 0 auto 1.5em; }
            h1 { font-size: 1.3em; text-align: center; }
            ul { line-height: 1.8; }
            code { background: #f4f4f4; padding: 0 0.3em; border-radius: 3px; }
            .tagline { text-align: center; color: #555; margin-bottom: 2em; }
          </style>
          <img src="./logo.png" alt="KDK" class="logo">
          <h1>Krust Development Kit</h1>
          <p class="tagline">Rust toolkit for Krux-style Bitcoin signing firmware.</p>
          <p>Documented crates:</p>
          <ul>
          HEAD
          for d in target/doc/*/; do
            crate=$(basename "$d")
            if [ -f "${d}index.html" ]; then
              printf '<li><a href="./%s/index.html"><code>%s</code></a></li>\n' "$crate" "$crate" >> target/doc/index.html
            fi
          done
          cat >> target/doc/index.html <<'TAIL'
          </ul>
          TAIL
          touch target/doc/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs: rebuild from ${{ github.sha }}'
